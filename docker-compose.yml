services:
  db:
    image: postgres:16-alpine
    container_name: tech_shop_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: techshop
      POSTGRES_PASSWORD: techshop
      POSTGRES_DB: techshop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techshop -d techshop"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    container_name: tech_shop_api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgres://techshop:techshop@db:5432/techshop
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
